name: Update Incremental

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-6'

jobs:
  update:
    uses: ci-ke/ProjectSekai-BangDream-story-crawler/.github/workflows/common-update.yml@main
    permissions:
      contents: write
    with:
      run_command: "uv run -m action.assets_pjsk incremental && uv run -m action.assets_bang incremental"
      commit_message: "Update incremental"